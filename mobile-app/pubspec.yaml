name: open_iot_app
description: "Open IoT Platform - 智能设备配网与控制 APP"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # IoT Platform SDK (本地依赖)
  iot_platform_sdk:
    path: ../iot-libs-common/flutter-sdk

  # BLE 蓝牙通信
  flutter_blue_plus: ^1.35.5

  # 权限管理
  permission_handler: ^11.3.1

  # 状态管理
  provider: ^6.1.2

  # WiFi 信息获取
  network_info_plus: ^6.1.1

  # 本地存储（SDK 依赖）
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # 图标生成
  flutter_launcher_icons: ^0.14.3
  # 启动图生成
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# 图标配置
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1E88E5"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

# 启动图配置
flutter_native_splash:
  color: "#1E88E5"
  image: "assets/splash/splash_logo.png"
  android_12:
    color: "#1E88E5"
    image: "assets/splash/splash_logo.png"
