<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="512" height="512" rx="115" fill="#1E88E5"/>

  <!-- WiFi 信号图标 -->
  <g transform="translate(256, 200)">
    <!-- 外圈 -->
    <path d="M-80 30 Q-40 -10, 0 -10 Q40 -10, 80 30" stroke="white" stroke-width="16" fill="none" stroke-linecap="round"/>
    <!-- 中圈 -->
    <path d="M-55 55 Q-25 25, 0 25 Q25 25, 55 55" stroke="white" stroke-width="16" fill="none" stroke-linecap="round"/>
    <!-- 内圈 -->
    <path d="M-30 80 Q-10 60, 0 60 Q10 60, 30 80" stroke="white" stroke-width="16" fill="none" stroke-linecap="round"/>
    <!-- 中心点 -->
    <circle cx="0" cy="100" r="12" fill="white"/>
  </g>

  <!-- IoT 节点连接线 -->
  <g transform="translate(256, 360)">
    <circle cx="-60" cy="0" r="8" fill="white" opacity="0.6"/>
    <circle cx="60" cy="0" r="8" fill="white" opacity="0.6"/>
    <circle cx="0" cy="-30" r="8" fill="white" opacity="0.6"/>
    <line x1="-60" y1="0" x2="0" y2="-30" stroke="white" stroke-width="3" opacity="0.4"/>
    <line x1="60" y1="0" x2="0" y2="-30" stroke="white" stroke-width="3" opacity="0.4"/>
    <line x1="-60" y1="0" x2="60" y2="0" stroke="white" stroke-width="3" opacity="0.4"/>
  </g>

  <!-- 装饰光点 -->
  <circle cx="140" cy="140" r="6" fill="white" opacity="0.3"/>
  <circle cx="372" cy="140" r="4" fill="white" opacity="0.2"/>
  <circle cx="140" cy="372" r="4" fill="white" opacity="0.2"/>
  <circle cx="372" cy="372" r="6" fill="white" opacity="0.3"/>
</svg>
