<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- WiFi 信号图标 -->
  <g transform="translate(200, 160)">
    <!-- 外圈 -->
    <path d="M-70 30 Q-35 -10, 0 -10 Q35 -10, 70 30" stroke="white" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- 中圈 -->
    <path d="M-45 55 Q-20 25, 0 25 Q20 25, 45 55" stroke="white" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- 内圈 -->
    <path d="M-20 80 Q-5 60, 0 60 Q5 60, 20 80" stroke="white" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- 中心点 -->
    <circle cx="0" cy="100" r="10" fill="white"/>
  </g>

  <!-- IoT 节点连接 -->
  <g transform="translate(200, 300)">
    <circle cx="-50" cy="0" r="7" fill="white" opacity="0.6"/>
    <circle cx="50" cy="0" r="7" fill="white" opacity="0.6"/>
    <circle cx="0" cy="-25" r="7" fill="white" opacity="0.6"/>
    <line x1="-50" y1="0" x2="0" y2="-25" stroke="white" stroke-width="3" opacity="0.4"/>
    <line x1="50" y1="0" x2="0" y2="-25" stroke="white" stroke-width="3" opacity="0.4"/>
    <line x1="-50" y1="0" x2="50" y2="0" stroke="white" stroke-width="3" opacity="0.4"/>
  </g>
</svg>
