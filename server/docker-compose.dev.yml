# ========================================
# IoT Platform Core - Docker Compose 开发配置
# 作者: 罗耀生
# 日期: 2025-12-16
# ========================================
#
# 用途：本地开发时使用
# 特点：只启动基础服务（MySQL/Redis/EMQX），不启动后端服务
# 使用：docker compose -f docker-compose.dev.yml up -d
#
# ========================================

name: iot-platform

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: iot-platform_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: iot_platform
      MYSQL_USER: iot_user
      MYSQL_PASSWORD: iot123456
    ports:
      - "48306:3306"    # MySQL: 48306
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-network
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: iot-platform_redis
    ports:
      - "48379:6379"    # Redis: 48379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-network
    restart: unless-stopped

  # EMQX MQTT Broker
  emqx:
    image: emqx/emqx:5.3.0
    container_name: iot-platform_emqx
    environment:
      EMQX_NAME: iot-emqx
      EMQX_HOST: 127.0.0.1
      # 启用 HTTP 认证（连接后端API进行设备认证）
      # 注意：开发模式下后端运行在宿主机，使用 host.docker.internal
      EMQX_AUTHENTICATION__1__MECHANISM: password_based
      EMQX_AUTHENTICATION__1__BACKEND: http
      EMQX_AUTHENTICATION__1__ENABLE: "true"
      EMQX_AUTHENTICATION__1__METHOD: get
      EMQX_AUTHENTICATION__1__URL: http://host.docker.internal:48080/api/v1/mqtt/auth?username=$${username}&password=$${password}&clientid=$${clientid}
      # 开发模式: 允许未匹配的 ACL
      EMQX_AUTHORIZATION__NO_MATCH: allow
    ports:
      - "48883:1883"    # MQTT: 48883
      - "48803:8083"    # MQTT WebSocket: 48803
      - "48884:18083"   # Dashboard: 48884 (admin/public)
    volumes:
      - emqx_data:/opt/emqx/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  emqx_data:

networks:
  iot-network:
    driver: bridge
