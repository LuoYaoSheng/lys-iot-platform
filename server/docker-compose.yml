# ========================================
# IoT Platform - 生产环境 Docker Compose
# 作者: 罗耀生
# 日期: 2026-01-10
# 说明: 使用远程镜像，适用于生产部署
# 代码库: https://gitee.com/luoyaosheng/open-iot-platform
# ========================================
#
# 使用说明:
# 1. 上传文件: docker-compose.yml + scripts/init.sql
# 2. 启动服务: docker compose up -d
# 3. 查看状态: docker compose ps
# 4. 查看日志: docker compose logs -f [service]
#
# 访问地址:
# - API: http://localhost:48080
# - MQTT TCP: localhost:1883
# - MQTT WS: localhost:8083
# ========================================

name: open-iot-platform

services:
  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: iot-platform-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: iot_platform
      MYSQL_USER: iot_user
      MYSQL_PASSWORD: iot123456
      TZ: Asia/Shanghai
      # 强制 UTF-8 编码
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "44306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - iot-network
    restart: unless-stopped

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: iot-platform-redis
    ports:
      - "47379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-network
    restart: unless-stopped

  # ==================== IoT Platform 服务 ====================
  iot-platform:
    image: docker.io/luoyaosheng/open-iot-platform:latest
    container_name: iot-platform
    environment:
      # 数据库配置
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: iot_user
      DB_PASSWORD: iot123456
      DB_NAME: iot_platform

      # Redis 配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DEVICE_TTL: 120

      # 服务配置
      SERVER_PORT: 48080

      # MQTT 配置（内置 Broker）
      MQTT_PORT: 1883
      MQTT_WS_PORT: 8083

      # JWT 配置（生产环境请修改密钥）
      JWT_SECRET: iot-platform-secret-key-change-me
      JWT_EXPIRE_HOURS: 168

      # 时区
      TZ: Asia/Shanghai
    ports:
      - "48080:48080"   # API 服务
      - "1883:1883"     # MQTT TCP
      - "8083:8083"     # MQTT WebSocket
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:48080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - iot-network
    restart: unless-stopped

# ==================== 数据卷 ====================
volumes:
  mysql_data:
    name: iot-platform-mysql-data
  redis_data:
    name: iot-platform-redis-data

# ==================== 网络 ====================
networks:
  iot-network:
    name: iot-network
    driver: bridge
