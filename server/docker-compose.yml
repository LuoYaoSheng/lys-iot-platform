# ========================================
# IoT Platform Core - Docker Compose (简化版)
# 作者: 罗耀生
# 日期: 2026-01-06
# 说明: 内置MQTT Broker，无需外部EMQX
# ========================================
#
# 使用说明:
# 1. 确保Docker已安装并启动
# 2. 修改 .env 文件中的配置
# 3. 启动所有服务: docker compose up -d
# 4. 查看服务状态: docker compose ps
#
# 访问地址:
# - API服务: http://localhost:48080
# - MQTT TCP: localhost:1883
# - MQTT WebSocket: localhost:8083
# ========================================

name: iot-lite

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: iot-platform_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: iot_platform
      MYSQL_USER: iot_user
      MYSQL_PASSWORD: iot123456
    ports:
      - "44306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-network
    restart: unless-stopped

  # IoT Platform Core (内置MQTT Broker)
  iot-platform-core:
    build: .
    container_name: iot-platform_core
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: iot_user
      DB_PASSWORD: iot123456
      DB_NAME: iot_platform
      SERVER_PORT: 48080
      MQTT_PORT: 1883
      MQTT_WS_PORT: 8083
      MQTT_BROKER_EXTERNAL: ${MQTT_BROKER_EXTERNAL:-localhost}
      JWT_SECRET: ${JWT_SECRET:-iot-platform-secret-key}
      TZ: Asia/Shanghai
    ports:
      - "48080:48080"   # API服务
      - "1883:1883"     # MQTT TCP
      - "8083:8083"     # MQTT WebSocket
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:48080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - iot-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  iot-network:
    driver: bridge
