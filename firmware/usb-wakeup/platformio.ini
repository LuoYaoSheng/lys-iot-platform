# PlatformIO Project Configuration
# ESP32-S3 USB Wakeup Device
# 硬件: ESP32-S3-N16R8 (16MB Flash + 8MB PSRAM)
# 作者: 罗耀生
# 日期: 2025-12-26

[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

# 需要 Arduino ESP32 Core v3.0+ 支持 USBHIDKeyboard
platform_packages = framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git

# USB 配置: 启用 CDC 用于串口调试，同时支持 HID
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_build.psram_type = opi

# USB CDC + HID 模式
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DMQTT_MAX_PACKET_SIZE=512
    -DCORE_DEBUG_LEVEL=3

# Serial config
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

# 库依赖 (USBHIDKeyboard 是 Arduino ESP32 v3.0+ 内置的)
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.3
    # USBHIDKeyboard 内置于 Arduino ESP32 Core v3.0+
    # #include <USBHIDKeyboard.h>
