# PlatformIO Project Configuration
# ESP32-S3 USB Wakeup Device
# 硬件: ESP32-S3-N16R8
# 作者: 罗耀生
# 日期: 2025-12-26

[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

# 指定稳定的 Arduino ESP32 Core 版本
platform_packages = framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#2.0.14

# USB 配置
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_build.psram_type = opi

# 使用自定义分区表
board_build.partitions = partition_tables/default.csv

# USB CDC + HID 模式
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3

# Serial config
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

# 库依赖
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^2.21.3
