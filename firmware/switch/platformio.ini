# PlatformIO Project Configuration
# ESP32 Smart Switch Firmware - ESP32-WROOM-32E
# Author: Luo Yaosheng
# Date: 2025-12-13
#
# Hardware: ESP32-WROOM-32E (38-pin module)
# Available GPIO: 25+

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino

# Serial config
upload_speed = 921600
monitor_speed = 115200

# Dependencies (ESP32Servo in lib/ folder)
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.3

# Partition table (larger app partition for OTA)
board_build.partitions = huge_app.csv

# Build flags
build_flags =
    -D MQTT_MAX_PACKET_SIZE=512
    -D CORE_DEBUG_LEVEL=0

# OTA (optional)
; upload_protocol = espota
; upload_port = 192.168.1.100
